<!DOCTYPE html>
<html>
<head>
    <title>View Candidates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body{
    background:#f4f6f9;
}

.card-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

h1{
    color:#2c3e50;
    margin-bottom:20px;
}
</style>
</head>
<body>
<div class="container mt-5">
    <div class="card-box">

<h1>View Candidates</h1>

<div class="mb-4">

<a href="index.html" class="btn btn-primary">
➕ Add Candidate
</a>

<a href="view.html" class="btn btn-success">
📋 View Candidates
</a>

<a href="dashboard.html" class="btn btn-dark">
📊 Dashboard
</a>

</div>

<hr>

<table class="table table-hover table-bordered">
<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
    <th>Update Status</th>
    <th>Delete</th>
</tr>
</thead>

<tbody id="candidateTable">
</tbody>

</table>

<script>

fetch("/candidates")
.then(res => res.json())
.then(data => {

    let output = "";

    data.forEach((candidate,index) => {
        output += `
<tr>
    <td>${index + 1}</td>
    <td>${candidate.name}</td>
    <td>${candidate.email}</td>
    <td>${candidate.phone}</td>
    <td>${candidate.status}</td>

    <td>
        <select onchange="updateStatus(${candidate.id}, this.value)">
            <option>Applied</option>
            <option>Interview</option>
            <option>Selected</option>
            <option>Rejected</option>
        </select>
    </td>

    <td>
        <button onclick="deleteCandidate(${candidate.id})"
                class="btn btn-danger">
            Delete
        </button>
    </td>
</tr>
`;
    });

    document.getElementById("candidateTable").innerHTML = output;

});

function updateStatus(id,status){

    fetch(`/updateStatus/${id}`,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({status})
    })
    .then(res=>res.text())
    .then(data=>{
        alert(data);
        location.reload();
    });

}

function deleteCandidate(id){

    if(confirm("Are you sure?")){

        fetch(`/deleteCandidate/${id}`,{
            method:"DELETE"
        })
        .then(res=>res.text())
        .then(data=>{
            alert(data);
            location.reload();
        });

    }

}

</script>
    </div>
    </div>
</body>
</html>
